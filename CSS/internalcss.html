<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        h1{
            color:pink;
            text-align: center;
        }
        #abc{
            color:coral;
        }
        .xyz{
            color: aqua;
        }
        h4,h5{
            color:blue;
        }
        *{
            border:1px solid black;
        }
        input[type="password"]{
            cursor:not-allowed
        }
    </style>
</head>
<body>
    <h1>Internal CSS</h1>
    <h2 id="abc">CSS</h2>
    <h3 class="xyz">Cascading style sheet</h3>
    <h4>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Odit, quasi.</h4>
    <h5>Lorem ipsum dolor sit amet consectetur adipisicing elit. Optio, eligendi?</h5>
    <input type="text" placeholder="Enter name">
    <input type="email" placeholder="Enter email">
    <input type="password" placeholder="Enter password" disabled>
</body>
</html>
